<div id="layout">
  <header id="header">
    <div id="header-brand">
      <h1 id="nombre-de-proyecto">Sistema de Gestión de Proyectos</h1>
      <p id="subtitulo">Administración de proyectos, clientes y tareas</p>
    </div>

    <nav id="header-nav">
      <a
        routerLink="/proyectos"
        routerLinkActive="nav-link-activo"
        [routerLinkActiveOptions]="{ exact: true }"
        class="nav-link"
      >
        <i class="pi pi-folder"></i>
        <span>Proyectos</span>
      </a>

      <a
        routerLink="/estadisticas"
        routerLinkActive="nav-link-activo"
        class="nav-link"
      >
        <i class="pi pi-chart-bar"></i>
        <span>Estadísticas</span>
      </a>
    </nav>

    <p-button
      label="Cerrar Sesión"
      icon="pi pi-sign-out"
      type="button"
      styleClass="boton-cerrar-sesion"
      (click)="cerrarSesion()"
    />
  </header>

  <main id="content">
    <ng-content></ng-content>
  </main>
</div>
