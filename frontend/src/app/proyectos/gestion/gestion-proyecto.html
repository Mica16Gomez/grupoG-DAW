<p-dialog [header]="header()" [modal]="true" [(visible)]="visible" [style]="{ width: '25rem' }"
    (onHide)="cerrarDialog()">

    <form [formGroup]="form">
        <div id="contenedor-formulario" style="display: flex; flex-direction: column; gap: 1rem;">

            <input pInputText type="text" id="nombre" placeholder="Nombre" formControlName="nombre" />

            <ng-select
                formControlName="cliente"
                [items]="clientes()"
                bindLabel="nombre"
                placeholder="Cliente"
                [clearable]="true"
            ></ng-select>

            <p-datepicker formControlName="fechaFinalizacion" placeholder="Fecha límite" appendTo="body" dateFormat="dd/mm/yy"></p-datepicker>

            <button id="boton-gestionar-clientes" pButton label="Gestionar Clientes" (click)="gestionarClientes()"
                severity="secondary"></button>

            @if (proyectoSeleccionado()) {
            <p-select id="estado" formControlName="estado" [options]="estados()" placeholder="Estado" appendTo="body" />
            }

            <button pButton id="guardar" label="Guardar" (click)="guardarProyecto()"></button>

        </div>
    </form>
</p-dialog>
<app-clientes-listado [(visible)]="dialogClientesVisible"></app-clientes-listado>
