<app-template>
  <div id="pagina-tareas">
    <section id="datos-basicos">
      <div class="resumen-card resumen-card--principal">
        <span class="resumen-etiqueta">Proyecto</span>
        <span class="resumen-valor">{{ proyecto()?.nombre }}</span>
      </div>

      @if (proyecto()?.cliente) {
        <div class="resumen-card">
          <span class="resumen-etiqueta">Cliente</span>
          <span class="resumen-valor">{{ proyecto()?.cliente }}</span>
        </div>
      }

      <div class="resumen-card">
        <span class="resumen-etiqueta">Estado</span>
        <span class="resumen-valor">{{ proyecto()?.estado }}</span>
      </div>
    </section>

    <div class="acciones-superiores">
      <p-button
        label="Volver a proyectos"
        icon="pi pi-arrow-left"
        type="button"
        styleClass="boton-secundario"
        (click)="volverAProyectos()"
      />

      <p-button
        label="Crear Tarea"
        icon="pi pi-plus"
        type="button"
        styleClass="boton-primario"
        (click)="crearTarea()"
      />
    </div>

    <p-table [value]="tareas()" id="tabla" styleClass="tabla-tareas">
      <ng-template pTemplate="header">
        <tr>
          <th>Nombre</th>
          <th>Estado</th>
          <th>Acciones</th>
        </tr>
      </ng-template>

      <ng-template pTemplate="body" let-tarea>
        <tr>
          <td>{{ tarea.descripcion }}</td>
          <td>{{ tarea.estado }}</td>
          <td>
            <p-button
              icon="pi pi-pencil"
              type="button"
              styleClass="boton-icono"
              pTooltip="Editar tarea"
              tooltipPosition="top"
              (click)="editarTarea(tarea)"
            />
          </td>
        </tr>
      </ng-template>

      <ng-template pTemplate="emptymessage">
        <tr>
          <td colspan="3">No se encontraron tareas.</td>
        </tr>
      </ng-template>
    </p-table>
  </div>
</app-template>

<app-gestion-tarea
  [(visible)]="dialogVisible"
  [(tareaSeleccionada)]="tareaSeleccionada"
  [idProyecto]="idProyecto()"
/>
