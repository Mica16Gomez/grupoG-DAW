<app-template>
    <section id="datos-basicos">
        <div class="resumen">
            <span class="resumen-label">Proyecto:</span> {{ proyecto()?.nombre }}
        </div>
        @if (proyecto()?.cliente) {
            <div class="resumen">
                <span class="resumen-label">Cliente:</span> {{ proyecto()?.cliente }}
            </div>
        }
        <div class="resumen">
            <span class="resumen-label">Estado:</span> {{ proyecto()?.estado }}
        </div>
    </section>

    <div class="acciones-tareas">
        <p-button
            id="boton-crear-tarea"
            icon="pi pi-plus"
            label="Crear Tarea"
            (click)="crearTarea()"
        />
        <span class="panel-hint">Arrastrá las tarjetas entre columnas para cambiar el estado</span>
    </div>

    <app-tareas-panel
        [tareas]="tareas()"
        (editarTarea)="editarTarea($event)"
        (cambiarEstado)="cambiarEstadoTarea($event)"
    />
</app-template>

<app-gestion-tarea
    [(visible)]="dialogVisible"
    [idProyecto]="idProyecto()"
    [(tareaSeleccionada)]="tareaSeleccionada"
/>
