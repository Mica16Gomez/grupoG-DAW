<p-dialog
  [visible]="visible()"
  (visibleChange)="visible.set($event)"
  [modal]="true"
  [draggable]="false"
  [resizable]="false"
  [style]="{ width: '64rem' }"
  header="Clientes"
  styleClass="clientes-dialog"
>
  <div class="acciones-superiores">
    <p-button
      label="Crear cliente"
      icon="pi pi-plus"
      type="button"
      (click)="crearCliente()"
      styleClass="boton-primario"
    />
  </div>

  <p-table [value]="clientes()" id="tabla" styleClass="tabla-clientes">
    <ng-template pTemplate="header">
      <tr>
        <th>Nombre</th>
        <th>Teléfono</th>
        <th>Email</th>
        <th>Estado</th>
        <th>Acciones</th>
      </tr>
    </ng-template>

    <ng-template pTemplate="body" let-cliente>
      <tr>
        <td>{{ cliente.nombre }}</td>
        <td class="columna-contacto">{{ cliente.telefono || "-" }}</td>
        <td class="columna-contacto">{{ cliente.email || "-" }}</td>
        <td>{{ cliente.estado }}</td>
        <td>
          <p-button
            icon="pi pi-pencil"
            type="button"
            (click)="editarCliente(cliente)"
            styleClass="boton-icono"
          />
        </td>
      </tr>
    </ng-template>

    <ng-template pTemplate="emptymessage">
      <tr>
        <td colspan="5">No se encontraron clientes.</td>
      </tr>
    </ng-template>
  </p-table>
</p-dialog>

<app-gestion-cliente
  [(visible)]="dialogVisible"
  [(clienteSeleccionado)]="clienteSeleccionado"
/>
