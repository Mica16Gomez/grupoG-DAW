<app-template>
  <div class="acciones-superiores">
    <p-button
      id="boton-crear-proyecto"
      icon="pi pi-plus"
      label="Crear Proyecto"
      styleClass="boton-accion"
      (click)="crearProyecto()"
    ></p-button>

    <p-button
      id="boton-exportar-csv"
      icon="pi pi-download"
      label="Exportar CSV"
      styleClass="boton-accion"
      (onClick)="descargarReporteCSV()"
    ></p-button>
  </div>

  <p-table
    id="tabla"
    [value]="proyectos()"
    [tableStyle]="{ 'min-width': '50rem' }"
    [scrollable]="true"
    scrollHeight="70vh"
  >
    <ng-template #header>
      <tr>
        <th>Nombre</th>
        <th>Cliente</th>
        <th>Fecha Fin</th>
        <th>Estado</th>
        <th>Acciones</th>
      </tr>
    </ng-template>

    <ng-template #body let-proyecto>
      <tr>
        <td>{{ proyecto.nombre }}</td>
        <td>{{ proyecto.cliente ? proyecto.cliente.nombre : '' }}</td>

        <td>
          @if (proyecto.fechaFinalizacion) {
          <div class="fecha-fin-bloque">
            <span class="fecha-fin-texto">{{
              proyecto.fechaFinalizacion | date : "dd/MM/yyyy"
            }}</span>
            <p-tag
              [value]="calcularEstadoFecha(proyecto.fechaFinalizacion).texto"
              [severity]="calcularEstadoFecha(proyecto.fechaFinalizacion).severidad"
            ></p-tag>
          </div>
          } @else {
          <span class="sin-fecha">Sin fecha</span>
          }
        </td>

        <td>{{ proyecto.estado }}</td>
        <td>
          <p-button
            id="boton-gestionar-tareas"
            icon="pi pi-list"
            pTooltip="Gestionar Tareas"
            (click)="gestionarTareas(proyecto)"
          ></p-button>
          <p-button
            icon="pi pi-pencil"
            pTooltip="Editar Proyecto"
            (click)="editarProyecto(proyecto)"
          ></p-button>
        </td>
      </tr>
    </ng-template>

    <ng-template #emptymessage>
      <tr>
        <td colspan="5">No se encontraron proyectos.</td>
      </tr>
    </ng-template>
  </p-table>
</app-template>

<app-gestion-proyecto
  [(visible)]="dialogVisible"
  [(proyectoSeleccionado)]="proyectoSeleccionado"
></app-gestion-proyecto>
